<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>📖 The Giver — Board Game</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1117;
  --surface: #161b27;
  --surface2: #1e2636;
  --border: rgba(180,150,80,0.18);
  --gold: #c9a84c;
  --gold2: #e8c97a;
  --gold-dim: rgba(201,168,76,0.12);
  --text: #e2d5bb;
  --muted: #6b7a8d;
  --green: #22c574;
  --red: #e05252;
  --blue: #5b9cf6;
  --snake-bg: rgba(224,82,82,0.12);
  --ladder-bg: rgba(34,197,116,0.12);
  --r: 14px;
  --r-sm: 10px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  min-height: 100dvh;
  background: var(--bg);
  font-family: 'Lora', Georgia, serif;
  color: var(--text);
  overflow-x: hidden;
}

/* ── Subtle grain texture ── */
body::before {
  content:'';
  position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  opacity: 0.6;
}

/* ── Header ── */
header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(13,17,23,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px 12px;
  text-align: center;
}
header h1 {
  font-family: 'Cinzel', serif;
  font-size: 1.25rem;
  color: var(--gold2);
  letter-spacing: 1.5px;
  text-shadow: 0 0 20px rgba(201,168,76,0.35);
}
header p { color: var(--muted); font-size: 0.72rem; margin-top:2px; font-style:italic; }

/* ── Join Screen ── */
#joinScreen {
  position: relative; z-index:1;
  max-width: 380px;
  margin: 40px auto;
  padding: 0 16px;
}
.join-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 28px 24px 24px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(201,168,76,0.06) inset;
}
.join-card h2 {
  font-family:'Cinzel',serif;
  font-size:1rem;
  color: var(--gold);
  text-align:center;
  margin-bottom:22px;
  letter-spacing:1px;
}
.field {
  width:100%;
  padding: 13px 16px;
  border-radius: var(--r-sm);
  border: 1.5px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-size: 0.95rem;
  font-family: 'Lora', serif;
  margin-bottom: 11px;
  outline: none;
  text-align:center;
  transition: border-color 0.2s, box-shadow 0.2s;
  -webkit-appearance: none;
}
.field:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
}
.join-btn {
  width:100%;
  padding: 15px;
  border-radius: var(--r-sm);
  border: none;
  background: linear-gradient(135deg, #c9a84c, #8a6018);
  color: #0d1117;
  font-size: 0.95rem;
  font-weight: 700;
  font-family: 'Cinzel', serif;
  letter-spacing: 1px;
  cursor: pointer;
  box-shadow: 0 4px 18px rgba(201,168,76,0.28);
  transition: transform 0.15s, box-shadow 0.15s;
  -webkit-appearance: none;
}
.join-btn:active { transform: scale(0.97); }
.err { color: var(--red); font-size:0.8rem; text-align:center; margin-bottom:8px; min-height:18px; }
.join-note { color:var(--muted); font-size:0.72rem; text-align:center; margin-top:10px; font-style:italic; }

/* ── Game Screen ── */
#gameScreen { display:none; position:relative; z-index:1; padding-bottom:30px; }

/* Winner */
#winnerBanner {
  display:none;
  margin: 12px 12px 0;
  background: linear-gradient(135deg,#c9a84c,#7a4c08);
  border-radius: var(--r);
  padding: 16px;
  text-align:center;
  font-family:'Cinzel',serif;
  font-size:1rem;
  color:#0d1117;
  box-shadow: 0 0 30px rgba(201,168,76,0.5);
  animation: glow 2s infinite;
}
@keyframes glow { 0%,100%{box-shadow:0 0 30px rgba(201,168,76,0.5)} 50%{box-shadow:0 0 55px rgba(201,168,76,0.8)} }

/* Players bar */
#playersBar {
  display:flex; gap:6px; flex-wrap:wrap;
  justify-content:center;
  padding: 10px 12px 0;
}
.pchip {
  padding: 6px 14px;
  border-radius: 100px;
  font-size: 0.68rem;
  font-family:'Cinzel',serif;
  font-weight:600;
  border: 1.5px solid transparent;
  transition: all 0.3s;
  white-space: nowrap;
}
.pchip.myturn { transform:scale(1.07); }

/* ── Board ── */
#boardWrap {
  margin: 10px 10px 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 10px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
#boardGrid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 4px;
  min-width: 320px;
}
.cell {
  border-radius: 8px;
  padding: 6px 3px 5px;
  min-height: 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.06);
  position: relative;
  transition: box-shadow 0.2s;
}
.cell-n {
  font-family:'Cinzel',serif;
  font-size: 0.65rem;
  font-weight:700;
  margin-bottom:1px;
  line-height:1;
}
.cell-label { font-size:0.42rem; opacity:0.75; margin-bottom:1px; letter-spacing:0.3px; }
.cell-text  { font-size:0.5rem; line-height:1.35; flex:1; opacity:0.85; }
.sl-badge   { position:absolute; top:2px; right:3px; font-size:0.55rem; }
.tokens     { display:flex; flex-wrap:wrap; gap:2px; justify-content:center; margin-top:3px; }
.token {
  width:17px; height:17px; border-radius:50%;
  border:1.5px solid rgba(255,255,255,0.8);
  display:flex; align-items:center; justify-content:center;
  font-size:0.42rem; color:white; font-weight:700;
  box-shadow: 0 2px 6px rgba(0,0,0,0.5);
}

/* Legend */
#legend {
  display:flex; gap:6px; flex-wrap:wrap;
  justify-content:center;
  padding: 8px 12px 0;
}
.leg {
  padding:4px 10px;
  border-radius:100px;
  font-size:0.62rem;
  font-weight:600;
  white-space:nowrap;
}

/* ── Q Card ── */
#qCard {
  display:none;
  margin: 10px 12px 0;
  background: var(--surface);
  border: 1.5px solid var(--gold);
  border-radius: var(--r);
  padding: 20px 16px 16px;
  box-shadow: 0 0 30px rgba(201,168,76,0.12);
}
#qType {
  font-family:'Cinzel',serif;
  font-size:0.85rem;
  color:var(--gold2);
  text-align:center;
  margin-bottom:10px;
  letter-spacing:0.5px;
}
#qText {
  font-size:0.98rem;
  line-height:1.65;
  text-align:center;
  color:#ddd;
  margin-bottom:14px;
}
#attemptCounter {
  text-align:center;
  font-size:0.72rem;
  color:var(--muted);
  margin-bottom:8px;
  font-style:italic;
}
#answerArea {
  width:100%;
  padding:12px 14px;
  border-radius:var(--r-sm);
  border:1.5px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-size:0.92rem;
  font-family:'Lora',serif;
  resize:none;
  height:90px;
  outline:none;
  transition:border-color 0.2s;
  -webkit-appearance:none;
}
#answerArea:focus { border-color:var(--gold); }

/* Hint — hidden until 2 wrong attempts */
#hintBox {
  display:none;
  background:rgba(201,168,76,0.08);
  border:1px solid rgba(201,168,76,0.25);
  border-radius:var(--r-sm);
  padding:11px 14px;
  margin-top:10px;
  font-size:0.82rem;
  color:var(--gold2);
  font-style:italic;
  line-height:1.55;
  animation: fadeIn 0.4s ease;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }

#feedbackBox {
  display:none;
  border-radius:var(--r-sm);
  padding:11px 14px;
  margin-top:10px;
  font-size:0.85rem;
  line-height:1.5;
  text-align:center;
  animation: fadeIn 0.3s ease;
}
.fb-correct { background:rgba(34,197,116,0.15); border:1px solid rgba(34,197,116,0.4); color:#5dfc9a; }
.fb-wrong   { background:rgba(224,82,82,0.13);  border:1px solid rgba(224,82,82,0.35); color:#ff8f7a; }

/* Q buttons */
.q-btns {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:12px;
}
.q-btn {
  padding:13px 10px;
  border-radius:var(--r-sm);
  border:none;
  font-weight:700;
  cursor:pointer;
  font-size:0.85rem;
  font-family:'Lora',serif;
  transition:transform 0.12s, opacity 0.12s;
  -webkit-appearance:none;
}
.q-btn:active { transform:scale(0.96); opacity:0.85; }
.btn-submit {
  background:linear-gradient(135deg,var(--gold),#8a5c10);
  color:#0d1117;
  grid-column: 1 / -1;
}
.btn-skip {
  background:rgba(255,255,255,0.06);
  color:var(--muted);
  border:1px solid rgba(255,255,255,0.1);
}

/* ── Controls ── */
#controls {
  margin:10px 12px 0;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:18px 16px;
  text-align:center;
}
#turnInfo {
  font-family:'Cinzel',serif;
  font-size:0.78rem;
  color:var(--gold2);
  margin-bottom:14px;
  letter-spacing:0.5px;
  line-height:1.5;
}

/* Die */
.die {
  width:80px; height:80px;
  margin:0 auto 10px;
  background:linear-gradient(145deg,#1f7a50,#0e4a28);
  border:2px solid rgba(34,197,116,0.5);
  border-radius:16px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(3,1fr);
  padding:10px; gap:4px;
  cursor:pointer;
  box-shadow:0 4px 20px rgba(34,197,116,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
  transition:opacity 0.2s,transform 0.15s;
  touch-action: manipulation;
}
.die:not(.off):active { transform:scale(0.93); }
.die.off { opacity:0.3; cursor:not-allowed; }
.die.rolling { animation:shake 0.55s ease-in-out; }
.ddot { border-radius:50%; }
.ddot.on { background:white; box-shadow:0 1px 4px rgba(0,0,0,0.4); }
@keyframes shake {
  0%,100%{transform:translate(0,0) rotate(0)}
  20%{transform:translate(-5px,3px) rotate(-6deg)}
  40%{transform:translate(5px,-3px) rotate(6deg)}
  60%{transform:translate(-3px,4px) rotate(-3deg)}
  80%{transform:translate(3px,-4px) rotate(3deg)}
}
#rollResult { color:var(--gold); font-size:0.92rem; min-height:22px; font-style:italic; }

/* ── Log ── */
#log {
  margin:10px 12px 0;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:11px 14px;
  font-size:0.7rem;
  color:var(--muted);
  max-height:95px;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.log-e { padding:3px 0; border-bottom:1px solid rgba(255,255,255,0.04); }

/* ── Answer Key ── */
#answersSection {
  margin:12px 12px 0;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:20px 16px;
}
#answersSection h2 {
  font-family:'Cinzel',serif;
  color:var(--gold);
  font-size:0.82rem;
  margin-bottom:14px;
  text-align:center;
  padding-bottom:10px;
  border-bottom:1px solid var(--border);
  letter-spacing:0.5px;
}
.ans-item {
  margin-bottom:13px;
  padding:12px;
  background:rgba(0,0,0,0.2);
  border-radius:var(--r-sm);
  border-left:3px solid var(--gold);
}
.ans-q { font-weight:700; color:var(--gold2); font-size:0.8rem; margin-bottom:5px; }
.ans-a { font-size:0.8rem; color:var(--text); line-height:1.6; opacity:0.88; }

/* Credit */
.credit {
  text-align:center;
  font-size:0.68rem;
  color:var(--muted);
  margin-top:16px;
  padding:0 16px 8px;
  font-style:italic;
  letter-spacing:0.3px;
}
</style>
</head>
<body>

<header>
  <h1>📖 The Giver</h1>
  <p>Multiplayer Board Game</p>
</header>

<!-- JOIN -->
<div id="joinScreen">
  <div class="join-card">
    <h2>Enter the Community</h2>
    <input class="field" id="nameInput" placeholder="Your name" maxlength="14" autocomplete="off"/>
    <input class="field" id="roomInput" placeholder="Room code (e.g. class1)" maxlength="12" autocomplete="off"/>
    <div class="err" id="errMsg"></div>
    <button class="join-btn" onclick="joinGame()">Join Game 🎲</button>
    <p class="join-note">All players enter the same room code</p>
  </div>
</div>

<!-- GAME -->
<div id="gameScreen">
  <div id="winnerBanner"></div>

  <div id="playersBar"></div>

  <div id="legend">
    <span class="leg" style="background:var(--ladder-bg);color:var(--green);border:1px solid rgba(34,197,116,0.3)">🪜 Ladder = Move Up</span>
    <span class="leg" style="background:var(--snake-bg);color:var(--red);border:1px solid rgba(224,82,82,0.3)">🐍 Snake = Move Down</span>
  </div>

  <div id="boardWrap"><div id="boardGrid"></div></div>

  <!-- Q Card -->
  <div id="qCard">
    <div id="qType"></div>
    <p id="qText"></p>
    <div id="attemptCounter"></div>
    <textarea id="answerArea" placeholder="Write your answer here..."></textarea>
    <div id="hintBox"></div>
    <div id="feedbackBox"></div>
    <div class="q-btns">
      <button class="q-btn btn-submit" onclick="submitAnswer()">✓ Submit Answer</button>
      <button class="q-btn btn-skip" onclick="skipQ()">Skip →</button>
    </div>
  </div>

  <!-- Controls -->
  <div id="controls">
    <div id="turnInfo">Loading...</div>
    <div class="die" id="die" onclick="rollDice()">
      <div class="ddot" id="d1"></div><div class="ddot" id="d2"></div><div class="ddot" id="d3"></div>
      <div class="ddot" id="d4"></div><div class="ddot" id="d5"></div><div class="ddot" id="d6"></div>
      <div class="ddot" id="d7"></div><div class="ddot" id="d8"></div><div class="ddot" id="d9"></div>
    </div>
    <div id="rollResult"></div>
  </div>

  <div id="log"><div style="text-align:center;font-style:italic">Game log...</div></div>

  <!-- Answer Key -->
  <div id="answersSection">
    <h2>📋 Answer Key — Teacher Only</h2>
    <div id="answersList"></div>
  </div>

  <p class="credit">Designed by Khalid Ahmed Al Seoud</p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  apiKey:"AIzaSyCTGEJe-CsiyDZQVdWIBkRYtWoQNy193U8",
  authDomain:"game-461bb.firebaseapp.com",
  databaseURL:"https://game-461bb-default-rtdb.firebaseio.com",
  projectId:"game-461bb",
  storageBucket:"game-461bb.firebasestorage.app",
  messagingSenderId:"634798461436",
  appId:"1:634798461436:web:dbb12ef70997ebdbf9e279"
});
const db = getDatabase(app);

const COLORS = ["#e05252","#5b9cf6","#f0a830","#a374e0"];
const FACES = {1:[5],2:[2,8],3:[1,5,9],4:[1,3,7,9],5:[1,3,5,7,9],6:[1,3,4,6,7,9]};

const SNAKES  = {9:3, 15:6, 17:11};
const LADDERS = {4:8, 11:14, 13:18};

const SQ = [
  {n:0,  type:"start",    text:"START\nThe Community"},
  {n:1,  type:"vocab",    text:'Define\n"Apprehensive"'},
  {n:2,  type:"good",     text:"Move ahead\n2 spaces →"},

  {n:10, type:"vocab",    text:'Define\n"Stirrings"'},
  {n:11, type:"ladder",   text:"🪜 Ladder!\nAnswer Q\nto climb"},
  {n:12, type:"question", text:"Why are memories\nimportant?"},
  {n:13, type:"ladder",   text:"🪜 Ladder!\nAnswer Q\nto climb"},
  {n:14, type:"good",     text:"Color memory!\nRoll again! 🎲"},
  {n:15, type:"snake",    text:"🐍 Snake!\nAnswer Q\nor slide down"},
  {n:16, type:"memory",   text:"Is freedom worth\nthe pain?"},
  {n:17, type:"snake",    text:"🐍 Snake!\nAnswer Q\nor slide down"},
  {n:18, type:"question", text:"What choice did\nJonas make\nat the end?"},
  {n:19, type:"good",     text:"Move ahead\n2 spaces →"},
  {n:20, type:"good",     text:"You found\nElsewhere!\nYou win! 🌟"},
  {n:21, type:"finish",   text:"FINISH\nElsewhere 🏔️"},
];

const CS = {
  start:    {bg:"#0f1623",c:"#c9a84c",l:""},
  finish:   {bg:"#0f1623",c:"#c9a84c",l:""},
  vocab:    {bg:"#111e38",c:"#5b9cf6",l:"📚 Vocab"},
  question: {bg:"#201808",c:"#f0a830",l:"❓ Q"},
  memory:   {bg:"#1a0f30",c:"#c084fc",l:"🌟 Theme"},
  good:     {bg:"#081a10",c:"#22c574",l:"✅ Bonus"},
  bad:      {bg:"#1a0808",c:"#e05252",l:"⚠️"},
  snake:    {bg:"#1a0a0a",c:"#e05252",l:"🐍 Snake"},
  ladder:   {bg:"#081620",c:"#22c574",l:"🪜 Ladder"},
};

const QA = {
  1:{q:'Define "Apprehensive".',hint:"Think about how Jonas felt before the Ceremony — was he calm or worried?",keys:["worried","anxious","nervous","fearful","uneasy","scared","dread"],answer:"Apprehensive means feeling worried, anxious, or nervous about something that is going to happen. Jonas felt apprehensive before the Ceremony of Twelve because he did not know what Assignment he would receive."},
  3:{q:"Why does Jonas feel different from others?",hint:"Think about his ability to see colors when others can't — what does 'Seeing Beyond' mean?",keys:["color","see beyond","memories","different","special","receiver","red"],answer:"Jonas feels different because he can perceive colors (like red) through 'Seeing Beyond', while others only see grey due to Sameness. He also has the capacity to hold memories, making him uniquely suited to be the Receiver of Memory."},
  4:{q:"🪜 What is the role of the Receiver of Memory?",hint:"The Giver passes something the whole community gave up. Why does one person need to hold it all?",keys:["memories","hold","receive","transmit","wisdom","community","protect","past"],answer:"The Receiver holds all memories of the past — joy, pain, color, music, love — on behalf of the entire Community. The community gave up memories for Sameness, so one person must keep them to provide wisdom when the Elders need guidance."},
  5:{q:'What does "Released" really mean?',hint:"Jonas watched his father do something to a baby on video. It was not a journey...",keys:["death","killed","injection","die","lethal","euthanasia","murder"],answer:"'Release' is a euphemism for death by lethal injection. People believe it is a peaceful farewell, but Jonas discovers the truth when he watches his father inject and kill an infant (a twin) who was to be released."},
  6:{q:'Define "Remorse".',hint:"Think of feeling very guilty after doing something wrong. That deep regret is remorse.",keys:["regret","guilt","sorry","sorrow","shame","sad","feel bad"],answer:"Remorse means a deep feeling of guilt and regret for something wrong you have done. Jonas experiences remorse when he realizes what 'release' actually means and feels guilt for not discovering the truth sooner."},
  8:{q:'What is "Sameness" in the Community?',hint:"The Community removed all differences — weather, color, emotions, choices. Think about why.",keys:["control","same","eliminate","color","choice","emotion","weather","difference","equal"],answer:"Sameness is the state achieved by eliminating all differences — no colors, no extreme weather, no individual choice, suppressed emotions. It was designed to create equality and prevent conflict, but it also removed beauty, love, and true freedom."},
  9:{q:"🐍 Who is Rosemary and what happened to her?",hint:"She was the Receiver before Jonas. She could not bear the pain of memories and made a permanent decision.",keys:["receiver","released","death","memories","failed","chose","left","apply","injection"],answer:"Rosemary was the previous Receiver, selected ten years before Jonas. Unable to bear painful memories, she applied for Release herself — meaning she was killed by injection. Her death caused disaster as all her memories flooded back into the Community."},
  10:{q:'Define "Stirrings".',hint:"Jonas had a warm dream about someone he cared for. His mother gave him a pill after he described it at breakfast.",keys:["feeling","desire","romantic","pill","dream","suppress","emotions","arousal","love"],answer:"Stirrings are romantic or sexual feelings and dreams that begin in adolescence. In the Community they are seen as dangerous and suppressed with daily pills to maintain emotional control and Sameness."},
  11:{q:"🪜 How does Jonas transmit memories to Gabriel?",hint:"Jonas did it by touch — the same way the Giver transmits to him. It happened by accident one night.",keys:["touch","hand","back","accidental","transmit","memory","calm","sleep","pat"],answer:"Jonas transmits memories through physical touch — by placing his hand on Gabriel's back while remembering a peaceful sail on a lake. It happened accidentally when he tried to soothe the baby to sleep, the same method the Giver uses with Jonas."},
  12:{q:"Why are memories important in the novel?",hint:"Without memories, can people make good decisions? Think about what the Elders ask the Giver for.",keys:["wisdom","pain","joy","decision","learn","history","guide","experience","understand","past"],answer:"Memories contain the full human experience — joy, love, pain, and wisdom. They allow people to learn from the past and make better decisions. The Giver preserves them because without memory, the Community cannot understand the consequences of its choices."},
  13:{q:"🪜 Describe the relationship between Jonas and the Giver.",hint:"It's more than student and teacher. Think about loneliness, hope, and what they share together.",keys:["trust","love","mentor","father","hope","lonely","friendship","student","teach","bond","son"],answer:"Their relationship is deeply meaningful — part mentor and student, part surrogate father and son. The Giver has been isolated for years. Jonas gives him hope and someone to share the burden of memories. They bond through trust, shared pain, and a dream of change."},
  15:{q:"🐍 What was the Ceremony of Twelve?",hint:"It happened once a year for all twelve-year-olds and decided their entire future life in one moment.",keys:["assignment","career","ceremony","twelve","job","elder","community","future","role","chief"],answer:"The Ceremony of Twelve is the annual event where each twelve-year-old receives their permanent Assignment — the career chosen by the Committee of Elders. It is the most significant ceremony as it determines a person's entire future role in the Community."},
  16:{q:"Is freedom worth the pain? Use the novel to support your answer.",hint:"Jonas gave up safety for color, music, and love — but gained hunger and cold. Was the trade worth it?",keys:["freedom","pain","choice","worth","color","love","music","sacrifice","escape","memory","real"],answer:"Open-ended. Model answer: Yes — Jonas chose to escape despite danger because he wanted real emotions, color, music, and love. The novel suggests a life of true meaning, even with suffering, is better than a painless life of control and emptiness."},
  17:{q:"🐍 Why did Jonas stop taking his pills?",hint:"The pills suppressed something important. What did Jonas want to feel again after receiving memories of love?",keys:["stirrings","feelings","emotions","love","real","experience","suppress","pill","stop","authentic"],answer:"Jonas stopped taking his pills because they suppressed his genuine emotions. After receiving memories of love and joy, he wanted to feel real emotions. Stopping the pills allowed authentic feelings, but also made him realize how emotionally empty everyone else in the Community was."},
  18:{q:"What choice did Jonas make at the end?",hint:"He took Gabriel and ran toward Elsewhere. Why did he leave everything behind?",keys:["escape","run","gabriel","elsewhere","leave","community","memories","freedom","sled","hope","save"],answer:"Jonas chose to escape from the Community, taking baby Gabriel to save him from being released (killed). He fled toward Elsewhere. By leaving, all his memories returned to the Community. He finds a sled and sees lights and hears music — suggesting a loving world beyond."},
  19:{q:"What does 'Elsewhere' represent in the novel?",hint:"Is it just a place? Think about what Jonas found there — lights, music, love. What is the opposite of the Community?",keys:["freedom","hope","real","love","music","color","outside","world","life","true"],answer:"Elsewhere represents true freedom, genuine human emotion, and real life — the opposite of the controlled, grey Community. For Jonas it symbolizes hope: a world where color, music, love, and choice exist. It may also represent the real world outside any totalitarian system."},
};

let myName="",roomId="",myId="",rolling=false;
let pendingPos=null,pendingAgain=false,pendingSkip=false,pendingSqType=null;
let wrongAttempts=0;
let currentPlayers={},currentTurn="";

function buildBoard(){
  const g=document.getElementById("boardGrid"); g.innerHTML="";
  SQ.forEach(sq=>{
    const t=CS[sq.type]||CS.vocab;
    const d=document.createElement("div");
    d.className="cell"; d.id="cell-"+sq.n;
    d.style.background=t.bg; d.style.borderColor=t.c+"33";
    let h="";
    if(sq.n>0&&sq.n<21) h+=`<div class="cell-n" style="color:${t.c}">${sq.n}</div>`;
    if(t.l) h+=`<div class="cell-label" style="color:${t.c}">${t.l}</div>`;
    h+=`<div class="cell-text" style="color:${t.c}99">${sq.text.replace(/\n/g,"<br>")}</div>`;
    if(SNAKES[sq.n])  h+=`<div class="sl-badge">🐍→${SNAKES[sq.n]}</div>`;
    if(LADDERS[sq.n]) h+=`<div class="sl-badge">🪜→${LADDERS[sq.n]}</div>`;
    h+=`<div class="tokens" id="tok-${sq.n}"></div>`;
    d.innerHTML=h; g.appendChild(d);
  });
}

function buildAnswerKey(){
  const list=document.getElementById("answersList"); list.innerHTML="";
  Object.entries(QA).forEach(([sq,qa])=>{
    const div=document.createElement("div"); div.className="ans-item";
    div.innerHTML=`<div class="ans-q">Square ${sq}: ${qa.q}</div><div class="ans-a">${qa.answer}</div>`;
    list.appendChild(div);
  });
}

function renderTokens(pl){
  document.querySelectorAll(".tokens").forEach(t=>t.innerHTML="");
  Object.values(pl).forEach(p=>{
    const c=document.getElementById("tok-"+(p.position??0));
    if(c) c.innerHTML+=`<div class="token" style="background:${p.color}" title="${p.name}">${p.name[0].toUpperCase()}</div>`;
  });
}

function renderPlayers(pl,ct){
  const bar=document.getElementById("playersBar"); bar.innerHTML="";
  Object.entries(pl).forEach(([id,p])=>{
    const d=document.createElement("div");
    d.className="pchip"+(id===ct?" myturn":"");
    d.style.background=p.color+"1a"; d.style.color=p.color;
    d.style.borderColor=id===ct?p.color:"transparent";
    if(id===ct) d.style.boxShadow=`0 0 12px ${p.color}44`;
    d.textContent=`${p.name} · ${p.position??0}`;
    bar.appendChild(d);
  });
}

function showFace(n){
  const a=FACES[n]||[];
  for(let i=1;i<=9;i++) document.getElementById("d"+i).className="ddot"+(a.includes(i)?" on":"");
}

function addLog(m){
  const l=document.getElementById("log");
  const e=document.createElement("div"); e.className="log-e"; e.textContent=m; l.prepend(e);
}

function updateAttemptCounter(){
  const el=document.getElementById("attemptCounter");
  if(wrongAttempts===0){el.textContent="";return;}
  el.textContent=`Attempts: ${wrongAttempts} ${wrongAttempts>=2?"(Hint unlocked below 💡)":"(1 more wrong → hint unlocks)"}`;
}

function showQCard(sqN,type){
  const qa=QA[sqN]; if(!qa) return false;
  const labels={vocab:"📚 Vocabulary",question:"❓ Question",memory:"🌟 Theme Challenge",snake:"🐍 Snake — Answer to Escape!",ladder:"🪜 Ladder — Answer to Climb!"};
  document.getElementById("qType").textContent=labels[type]||"❓ Question";
  document.getElementById("qText").textContent=qa.q;
  document.getElementById("answerArea").value="";
  document.getElementById("hintBox").style.display="none";
  document.getElementById("hintBox").textContent="";
  document.getElementById("feedbackBox").style.display="none";
  document.getElementById("feedbackBox").textContent="";
  wrongAttempts=0;
  updateAttemptCounter();
  document.getElementById("qCard").style.display="block";
  setTimeout(()=>document.getElementById("answerArea").focus(),300);
  return true;
}

window.submitAnswer=async function(){
  const ans=document.getElementById("answerArea").value.trim().toLowerCase();
  if(!ans){return;}
  const sq=SQ.find(s=>s.n===pendingPos);
  const qa=sq?QA[sq.n]:null;
  const fb=document.getElementById("feedbackBox");
  fb.style.display="block";

  if(qa){
    const matched=qa.keys.some(k=>ans.includes(k.toLowerCase()));
    if(matched){
      fb.className="feedbackBox fb-correct";
      fb.style.cssText="display:block;border-radius:10px;padding:11px 14px;margin-top:10px;font-size:0.85rem;line-height:1.5;text-align:center;animation:fadeIn 0.3s ease;background:rgba(34,197,116,0.15);border:1px solid rgba(34,197,116,0.4);color:#5dfc9a;";
      fb.textContent="✅ Correct! Moving forward...";
      setTimeout(()=>finishQuestion(true),1500);
    } else {
      wrongAttempts++;
      fb.className="feedbackBox fb-wrong";
      fb.style.cssText="display:block;border-radius:10px;padding:11px 14px;margin-top:10px;font-size:0.85rem;line-height:1.5;text-align:center;animation:fadeIn 0.3s ease;background:rgba(224,82,82,0.13);border:1px solid rgba(224,82,82,0.35);color:#ff8f7a;";
      fb.textContent=wrongAttempts>=2
        ?"❌ Not quite. A hint has appeared below! 💡"
        :"❌ Not quite. Try again!";
      updateAttemptCounter();
      // Show hint after 2 wrong attempts
      if(wrongAttempts>=2){
        const h=document.getElementById("hintBox");
        h.style.display="block";
        h.textContent="💡 Hint: "+qa.hint;
      }
    }
  } else {
    fb.style.cssText="display:block;border-radius:10px;padding:11px 14px;margin-top:10px;font-size:0.85rem;line-height:1.5;text-align:center;animation:fadeIn 0.3s ease;background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.3);color:#e8c97a;";
    fb.textContent="✅ Noted! Moving on...";
    setTimeout(()=>finishQuestion(true),1500);
  }
};

window.skipQ=function(){ finishQuestion(false); };

async function finishQuestion(passed){
  document.getElementById("qCard").style.display="none";
  let finalPos=pendingPos;

  if(pendingSqType==="snake"){
    if(passed){ addLog(`${myName} escaped the snake! Stays at ${finalPos}.`); }
    else { finalPos=SNAKES[pendingPos]??pendingPos; addLog(`${myName} slides down the snake 🐍 to ${finalPos}!`); }
  } else if(pendingSqType==="ladder"){
    if(passed){ finalPos=LADDERS[pendingPos]??pendingPos; addLog(`${myName} climbs the ladder 🪜 to ${finalPos}!`); }
    else { addLog(`${myName} missed the ladder — stays at ${finalPos}.`); }
  }

  finalPos=Math.min(finalPos,21);
  await update(ref(db,`rooms/${roomId}/players/${myId}`),{position:finalPos});

  if(finalPos>=21){
    const b=document.getElementById("winnerBanner");
    b.style.display="block";
    b.textContent=`🎉 ${myName} reached Elsewhere and wins!`;
  }

  if(!pendingAgain){
    const keys=Object.keys(currentPlayers);
    let ni=(keys.indexOf(currentTurn)+1)%keys.length;
    if(pendingSkip) ni=(ni+1)%keys.length;
    await update(ref(db,`rooms/${roomId}`),{currentTurn:keys[ni]});
  }
  pendingPos=null; pendingAgain=false; pendingSkip=false; pendingSqType=null; wrongAttempts=0;
}

window.joinGame=async function(){
  const name=document.getElementById("nameInput").value.trim();
  const room=document.getElementById("roomInput").value.trim().toLowerCase();
  const err=document.getElementById("errMsg");
  if(!name||!room){err.textContent="Enter name and room code!";return;}
  err.textContent="";
  const snap=await get(ref(db,`rooms/${room}`));
  const data=snap.val()||{};
  const pl=data.players||{};
  if(Object.keys(pl).length>=4){err.textContent="Room is full! Max 4 players.";return;}
  myName=name; roomId=room; myId=name+"_"+Date.now();
  const color=COLORS[Object.keys(pl).length];
  await update(ref(db,`rooms/${room}/players/${myId}`),{name,color,position:0,id:myId});
  if(!data.currentTurn) await update(ref(db,`rooms/${room}`),{currentTurn:myId});
  document.getElementById("joinScreen").style.display="none";
  document.getElementById("gameScreen").style.display="block";
  buildBoard(); buildAnswerKey(); showFace(1);
  onValue(ref(db,`rooms/${room}`),snap=>{
    const s=snap.val(); if(!s) return;
    const pl=s.players||{}; const ct=s.currentTurn;
    currentPlayers=pl; currentTurn=ct;
    renderTokens(pl); renderPlayers(pl,ct);
    const ami=pl[ct]?.name===myName;
    document.getElementById("turnInfo").textContent=ami?"🎲 Your turn! Roll the dice!":"⏳ Waiting for "+(pl[ct]?.name||"...");
    document.getElementById("die").className="die"+(ami?"":" off");
    Object.values(pl).forEach(p=>{
      if((p.position??0)>=21){
        const b=document.getElementById("winnerBanner");
        b.style.display="block";
        b.textContent=`🎉 ${p.name} reached Elsewhere and wins! 🌟`;
      }
    });
  });
};

window.rollDice=async function(){
  if(rolling) return;
  const snap=await get(ref(db,`rooms/${roomId}`));
  const s=snap.val(); if(!s) return;
  const cp=s.players[s.currentTurn];
  if(!cp||cp.name!==myName) return;
  rolling=true;
  const die=document.getElementById("die");
  die.classList.add("rolling");
  document.getElementById("rollResult").textContent="";
  const iv=setInterval(()=>showFace(Math.ceil(Math.random()*6)),80);
  setTimeout(async()=>{
    clearInterval(iv); die.classList.remove("rolling");
    const roll=Math.ceil(Math.random()*6);
    showFace(roll);
    document.getElementById("rollResult").textContent="Rolled: "+roll;
    let pos=Math.min((cp.position??0)+roll,21);
    const sq=SQ.find(s=>s.n===pos);
    addLog(`${myName} rolled ${roll} → Square ${pos}`);
    if(sq?.type==="good"&&sq.text.includes("2 spaces")) pos=Math.min(pos+2,21);
    if(sq?.type==="good"&&sq.text.includes("1 space"))  pos=Math.min(pos+1,21);
    const again=sq?.type==="good"&&sq.text.includes("Roll again");
    const skip =sq?.type==="bad" &&sq.text.includes("Skip");
    pendingPos=pos; pendingAgain=again; pendingSkip=skip; pendingSqType=sq?.type;
    const needsQ=["vocab","question","memory","snake","ladder"].includes(sq?.type);
    if(needsQ&&QA[pos]){
      showQCard(pos,sq.type);
    } else {
      await update(ref(db,`rooms/${roomId}/players/${myId}`),{position:pos});
      if(!again){
        const keys=Object.keys(s.players);
        let ni=(keys.indexOf(s.currentTurn)+1)%keys.length;
        if(skip) ni=(ni+1)%keys.length;
        await update(ref(db,`rooms/${roomId}`),{currentTurn:keys[ni]});
      }
      pendingPos=null; pendingSqType=null;
      if(pos>=21){
        const b=document.getElementById("winnerBanner");
        b.style.display="block";
        b.textContent=`🎉 ${myName} reached Elsewhere and wins! 🌟`;
      }
    }
    rolling=false;
  },650);
};
</script>
