<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎲 النرد</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1c1c28;
    --accent: #7c3aed;
    --accent2: #a855f7;
    --glow: rgba(124, 58, 237, 0.4);
    --text: #e2e8f0;
    --muted: #64748b;
    --white: #ffffff;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Tajawal', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,58,237,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,58,237,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* Ambient glow */
  body::after {
    content: '';
    position: fixed;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(124,58,237,0.12) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 48px;
    z-index: 1;
    padding: 40px 20px;
  }

  h1 {
    font-size: clamp(1.6rem, 4vw, 2.2rem);
    font-weight: 900;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--white) 30%, var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
  }

  /* Dice Scene */
  .dice-scene {
    perspective: 800px;
  }

  .dice-wrapper {
    cursor: pointer;
    position: relative;
  }

  .dice-wrapper:hover .die {
    box-shadow:
      0 0 40px var(--glow),
      0 0 80px rgba(124,58,237,0.2),
      inset 0 1px 0 rgba(255,255,255,0.1);
  }

  .die {
    width: 160px;
    height: 160px;
    background: var(--surface2);
    border: 1.5px solid rgba(124,58,237,0.4);
    border-radius: 28px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    padding: 18px;
    gap: 4px;
    box-shadow:
      0 0 20px var(--glow),
      inset 0 1px 0 rgba(255,255,255,0.07);
    transition: box-shadow 0.3s ease, transform 0.15s ease;
    position: relative;
    transform-style: preserve-3d;
  }

  .die:active {
    transform: scale(0.94);
  }

  .dot {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: transparent;
    transition: background 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .dot.active {
    background: radial-gradient(circle at 35% 35%, var(--accent2), var(--accent));
    box-shadow: 0 0 8px var(--glow), 0 0 16px rgba(168,85,247,0.3);
  }

  /* Rolling animation */
  @keyframes roll {
    0%   { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
    20%  { transform: rotateX(200deg) rotateY(100deg) rotateZ(80deg); }
    40%  { transform: rotateX(350deg) rotateY(220deg) rotateZ(160deg); }
    60%  { transform: rotateX(450deg) rotateY(310deg) rotateZ(230deg); }
    80%  { transform: rotateX(500deg) rotateY(380deg) rotateZ(290deg); }
    100% { transform: rotateX(540deg) rotateY(420deg) rotateZ(360deg); }
  }

  @keyframes shake {
    0%,100% { transform: translate(0,0) rotate(0deg); }
    15%  { transform: translate(-8px, 4px) rotate(-6deg); }
    30%  { transform: translate(8px, -4px) rotate(6deg); }
    45%  { transform: translate(-6px, 6px) rotate(-4deg); }
    60%  { transform: translate(6px, -6px) rotate(4deg); }
    75%  { transform: translate(-4px, 3px) rotate(-2deg); }
    90%  { transform: translate(4px, -3px) rotate(2deg); }
  }

  .die.rolling {
    animation: shake 0.6s ease-in-out, roll 0.6s ease-in-out;
  }

  /* Number display */
  .number-display {
    font-family: 'Space Mono', monospace;
    font-size: 5rem;
    font-weight: 700;
    color: var(--white);
    min-height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-shadow: 0 0 30px var(--glow), 0 0 60px rgba(168,85,247,0.3);
    transition: opacity 0.2s;
    letter-spacing: -4px;
  }

  .number-display.hidden { opacity: 0; }

  /* Roll button */
  .roll-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    color: var(--white);
    font-family: 'Tajawal', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    padding: 14px 48px;
    border-radius: 100px;
    cursor: pointer;
    letter-spacing: 0.05em;
    box-shadow: 0 4px 24px var(--glow), 0 0 0 0 var(--glow);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    position: relative;
    overflow: hidden;
  }

  .roll-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    border-radius: inherit;
  }

  .roll-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px var(--glow), 0 0 0 4px rgba(124,58,237,0.15);
  }

  .roll-btn:active {
    transform: translateY(0);
  }

  .roll-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  /* History */
  .history-label {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 10px;
    text-align: center;
  }

  .history {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 320px;
    min-height: 36px;
  }

  .hist-chip {
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    padding: 5px 14px;
    border-radius: 100px;
    background: var(--surface2);
    border: 1px solid rgba(124,58,237,0.2);
    color: var(--muted);
    animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .hist-chip:first-child {
    background: rgba(124,58,237,0.15);
    border-color: rgba(124,58,237,0.5);
    color: var(--accent2);
  }

  @keyframes popIn {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  /* Tip */
  .tip {
    font-size: 0.8rem;
    color: var(--muted);
    opacity: 0.7;
  }
</style>
</head>
<body>

<div class="container">
  <h1>🎲 رامي النرد</h1>

  <div class="dice-scene">
    <div class="dice-wrapper" onclick="rollDice()" title="اضغط لترمي النرد">
      <div class="die" id="die">
        <div class="dot" id="d1"></div>
        <div class="dot" id="d2"></div>
        <div class="dot" id="d3"></div>
        <div class="dot" id="d4"></div>
        <div class="dot" id="d5"></div>
        <div class="dot" id="d6"></div>
        <div class="dot" id="d7"></div>
        <div class="dot" id="d8"></div>
        <div class="dot" id="d9"></div>
      </div>
    </div>
  </div>

  <div class="number-display hidden" id="numDisplay">—</div>

  <button class="roll-btn" id="rollBtn" onclick="rollDice()">🎲 ارمي النرد</button>

  <div>
    <div class="history-label">آخر النتائج</div>
    <div class="history" id="history"></div>
  </div>

  <span class="tip">يمكنك الضغط على النرد أو الزر</span>
</div>

<script>
// Dot positions per face (which of the 9 grid cells are active)
// Grid positions: 1=top-left, 2=top-center, 3=top-right,
//                 4=mid-left,  5=center,     6=mid-right,
//                 7=bot-left,  8=bot-center, 9=bot-right
const FACES = {
  1: [5],
  2: [2, 8],
  3: [1, 5, 9],
  4: [1, 3, 7, 9],
  5: [1, 3, 5, 7, 9],
  6: [1, 3, 4, 6, 7, 9],
};

let rolling = false;
let history = [];

function showFace(n) {
  const active = FACES[n];
  for (let i = 1; i <= 9; i++) {
    const dot = document.getElementById('d' + i);
    dot.classList.toggle('active', active.includes(i));
  }
}

function rollDice() {
  if (rolling) return;
  rolling = true;

  const btn = document.getElementById('rollBtn');
  const die = document.getElementById('die');
  const display = document.getElementById('numDisplay');

  btn.disabled = true;
  display.classList.add('hidden');

  // Flash random faces during roll
  let ticks = 0;
  const interval = setInterval(() => {
    const rand = Math.ceil(Math.random() * 6);
    showFace(rand);
    ticks++;
  }, 80);

  // Trigger CSS animation
  die.classList.add('rolling');

  setTimeout(() => {
    clearInterval(interval);
    die.classList.remove('rolling');

    const result = Math.ceil(Math.random() * 6);
    showFace(result);

    display.textContent = result;
    display.classList.remove('hidden');

    // Add to history
    history.unshift(result);
    if (history.length > 6) history.pop();
    renderHistory();

    rolling = false;
    btn.disabled = false;
  }, 650);
}

function renderHistory() {
  const el = document.getElementById('history');
  el.innerHTML = history.map((n, i) =>
    `<span class="hist-chip">${n}</span>`
  ).join('');
}

// Initialize with face 1
showFace(1);

// Keyboard support
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter') {
    e.preventDefault();
    rollDice();
  }
});
</script>
</body>
</html>
