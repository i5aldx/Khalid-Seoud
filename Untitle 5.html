<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎲 Dice Roller</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: sans-serif;
    position: relative;
    gap: 28px;
    padding: 24px;
  }

  .logo {
    position: absolute;
    top: 20px;
    left: 20px;
    width: 72px;
    height: 72px;
    border-radius: 50%;
    overflow: hidden;
    background: #fff;
  }
  .logo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    mix-blend-mode: multiply;
  }

  .name {
    position: absolute;
    bottom: 20px;
    left: 24px;
    font-size: 0.88rem;
    font-weight: 600;
    color: rgba(0,0,0,0.28);
    letter-spacing: 0.04em;
  }

  h1 {
    font-size: 1.8rem;
    font-weight: 900;
    color: #1a3a2a;
    margin-bottom: -10px;
  }

  .spacer { height: 30px; }

  .die {
    width: 170px;
    height: 170px;
    background: linear-gradient(145deg, #27ae60, #1a7a40);
    border: 3px solid #1a5c2a;
    border-radius: 32px;
    display: grid;
    grid-template-columns: repeat(3,1fr);
    grid-template-rows: repeat(3,1fr);
    padding: 20px;
    gap: 8px;
    cursor: pointer;
    box-shadow: 0 0 16px rgba(39,174,96,0.3), 0 8px 24px rgba(0,0,0,0.12);
    transition: box-shadow 0.2s, transform 0.15s;
  }
  .die:hover {
    box-shadow: 0 0 28px rgba(39,174,96,0.45), 0 10px 28px rgba(0,0,0,0.15);
  }
  .die.rolling {
    transform: scale(0.94) rotate(5deg);
    box-shadow: 0 0 40px rgba(39,174,96,0.6), 0 12px 40px rgba(0,0,0,0.15);
  }

  .dot {
    border-radius: 50%;
    background: transparent;
    transition: background 0.06s, box-shadow 0.06s;
  }
  .dot.active {
    background: #ffffff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }

  .roll-btn {
    background: linear-gradient(135deg, #27ae60, #1a7a40);
    border: none;
    color: #fff;
    font-size: 1.1rem;
    font-weight: 700;
    padding: 14px 52px;
    border-radius: 100px;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(39,174,96,0.35);
    transition: all 0.15s;
  }
  .roll-btn:disabled {
    background: #ccc;
    cursor: not-allowed;
    box-shadow: none;
  }

  .history-label {
    font-size: 0.75rem;
    color: #999;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 10px;
    text-align: center;
  }
  .history {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 320px;
  }
  .chip {
    font-family: monospace;
    font-size: 0.9rem;
    padding: 5px 16px;
    border-radius: 100px;
    background: #f5f5f5;
    border: 1.5px solid #e0e0e0;
    color: #888;
  }
  .chip.latest {
    background: rgba(39,174,96,0.12);
    border-color: #27ae60;
    color: #1a7a40;
    font-weight: 700;
  }

  .tip {
    font-size: 0.8rem;
    color: #bbb;
  }
</style>
</head>

<h1>🎲 Dice Roller</h1>
<div class="spacer"></div>

<div class="die" id="die" onclick="rollDice()">
  <div class="dot" id="d1"></div>
  <div class="dot" id="d2"></div>
  <div class="dot" id="d3"></div>
  <div class="dot" id="d4"></div>
  <div class="dot" id="d5"></div>
  <div class="dot" id="d6"></div>
  <div class="dot" id="d7"></div>
  <div class="dot" id="d8"></div>
  <div class="dot" id="d9"></div>
</div>

<button class="roll-btn" id="btn" onclick="rollDice()">🎲 Roll the Dice</button>

<div>
  <div class="history-label">Last Results</div>
  <div class="history" id="history"></div>
</div>

<span class="tip">Click the dice or the button to roll</span>

<script>
const FACES = {
  1:[5], 2:[2,8], 3:[1,5,9],
  4:[1,3,7,9], 5:[1,3,5,7,9], 6:[1,3,4,6,7,9]
};

let rolling = false;
let history = [];

function showFace(n) {
  const active = FACES[n];
  for (let i = 1; i <= 9; i++) {
    document.getElementById('d'+i).className = 'dot' + (active.includes(i) ? ' active' : '');
  }
}

function rollDice() {
  if (rolling) return;
  rolling = true;
  const die = document.getElementById('die');
  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = '⏳ Rolling...';
  die.classList.add('rolling');

  const interval = setInterval(() => {
    showFace(Math.ceil(Math.random() * 6));
  }, 80);

  setTimeout(() => {
    clearInterval(interval);
    die.classList.remove('rolling');
    const result = Math.ceil(Math.random() * 6);
    showFace(result);
    history.unshift(result);
    if (history.length > 6) history.pop();
    renderHistory();
    rolling = false;
    btn.disabled = false;
    btn.textContent = '🎲 Roll the Dice';
  }, 650);
}

function renderHistory() {
  document.getElementById('history').innerHTML = history.map((n,i) =>
    '<span class="chip' + (i===0?' latest':'') + '">' + n + '</span>'
  ).join('');
}

showFace(1);

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); rollDice(); }
});
</script>
