<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📖 The Giver — Board Game</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { min-height:100vh; background:#0f172a; font-family:'Georgia',serif; color:#f8fafc; padding:16px; }
  header { text-align:center; margin-bottom:16px; }
  header h1 { font-size:1.8rem; }
  header p { color:#64748b; font-size:0.85rem; }
  #joinScreen { max-width:380px; margin:60px auto 0; background:#1e293b; border-radius:20px; padding:32px; box-shadow:0 20px 60px rgba(0,0,0,0.4); text-align:center; }
  #joinScreen h2 { margin-bottom:20px; font-size:1.2rem; }
  #joinScreen input { width:100%; padding:12px 16px; border-radius:10px; border:1.5px solid #334155; background:#0f172a; color:#f8fafc; font-size:1rem; margin-bottom:12px; outline:none; text-align:center; }
  .btn { width:100%; padding:14px; border-radius:10px; border:none; background:linear-gradient(135deg,#22c55e,#16a34a); color:white; font-size:1.05rem; font-weight:bold; cursor:pointer; }
  .err { color:#ef4444; font-size:0.85rem; margin-bottom:10px; }
  #gameScreen { display:none; max-width:900px; margin:0 auto; }
  #winnerBanner { display:none; background:linear-gradient(135deg,#f59e0b,#ef4444); border-radius:12px; padding:16px; text-align:center; font-size:1.3rem; font-weight:bold; margin-bottom:16px; }
  #playersBar { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-bottom:16px; }
  .pchip { padding:8px 16px; border-radius:100px; font-size:0.82rem; font-weight:bold; border:2px solid transparent; transition:all 0.3s; }
  .pchip.myturn { transform:scale(1.08); }
  #boardWrap { background:#1e293b; border-radius:16px; padding:12px; margin-bottom:16px; overflow-x:auto; }
  #boardGrid { display:grid; grid-template-columns:repeat(6,1fr); gap:6px; min-width:480px; }
  .cell { border-radius:10px; padding:8px 4px; min-height:90px; display:flex; flex-direction:column; align-items:center; text-align:center; border:1.5px solid rgba(255,255,255,0.08); }
  .cell-n { font-size:0.85rem; font-weight:bold; margin-bottom:2px; }
  .cell-label { font-size:0.55rem; opacity:0.75; margin-bottom:2px; }
  .cell-text { font-size:0.62rem; line-height:1.35; flex:1; }
  .tokens { display:flex; flex-wrap:wrap; gap:2px; justify-content:center; margin-top:4px; }
  .token { width:18px; height:18px; border-radius:50%; border:2px solid white; display:flex; align-items:center; justify-content:center; font-size:0.5rem; color:white; font-weight:bold; box-shadow:0 2px 6px rgba(0,0,0,0.4); }
  #qCard { display:none; background:#1e293b; border:2px solid #f59e0b; border-radius:12px; padding:20px; margin-bottom:16px; text-align:center; }
  #qCard h3 { color:#f59e0b; margin-bottom:10px; }
  #qCard p { font-size:1.05rem; line-height:1.6; }
  #qCard button { margin-top:14px; padding:10px 28px; border-radius:8px; border:none; background:#f59e0b; color:white; font-weight:bold; cursor:pointer; font-size:0.95rem; }
  #controls { background:#1e293b; border-radius:16px; padding:20px; text-align:center; margin-bottom:16px; }
  #turnInfo { font-size:1rem; font-weight:bold; margin-bottom:14px; }
  .die { width:90px; height:90px; margin:0 auto 14px; background:linear-gradient(145deg,#22c55e,#15803d); border:3px solid #166534; border-radius:18px; display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(3,1fr); padding:12px; gap:5px; cursor:pointer; box-shadow:0 4px 20px rgba(34,197,94,0.4); transition:opacity 0.2s; }
  .die.off { opacity:0.4; cursor:not-allowed; }
  .die.rolling { animation:shake 0.6s ease-in-out; }
  .ddot { border-radius:50%; background:transparent; transition:background 0.06s; }
  .ddot.on { background:white; box-shadow:0 1px 4px rgba(0,0,0,0.3); }
  @keyframes shake { 0%,100%{transform:translate(0,0) rotate(0)} 15%{transform:translate(-6px,3px) rotate(-5deg)} 30%{transform:translate(6px,-3px) rotate(5deg)} 45%{transform:translate(-4px,4px) rotate(-3deg)} 60%{transform:translate(4px,-4px) rotate(3deg)} }
  #rollResult { color:#94a3b8; font-size:0.9rem; min-height:22px; }
  #log { background:#1e293b; border-radius:12px; padding:14px; font-size:0.78rem; color:#64748b; max-height:120px; overflow-y:auto; }
  .log-e { padding:3px 0; border-bottom:1px solid #0f172a; }
  .credit { text-align:center; font-size:0.72rem; color:#334155; margin-top:12px; }
</style>
</head>
<body>
<header><h1>📖 The Giver</h1><p>Multiplayer Board Game</p></header>

<div id="joinScreen">
  <h2>Join a Game</h2>
  <input id="nameInput" placeholder="Your name" maxlength="14"/>
  <input id="roomInput" placeholder="Room code (e.g. class1)" maxlength="12"/>
  <div class="err" id="errMsg"></div>
  <button class="btn" onclick="joinGame()">Join Game 🎲</button>
  <p style="color:#475569;font-size:0.78rem;margin-top:12px">All players use the same room code</p>
</div>

<div id="gameScreen">
  <div id="winnerBanner"></div>
  <div id="playersBar"></div>
  <div id="boardWrap"><div id="boardGrid"></div></div>
  <div id="qCard"><h3 id="qType"></h3><p id="qText"></p><button onclick="closeQ()">Got it! ✓</button></div>
  <div id="controls">
    <div id="turnInfo">Loading...</div>
    <div class="die" id="die" onclick="rollDice()">
      <div class="ddot" id="d1"></div><div class="ddot" id="d2"></div><div class="ddot" id="d3"></div>
      <div class="ddot" id="d4"></div><div class="ddot" id="d5"></div><div class="ddot" id="d6"></div>
      <div class="ddot" id="d7"></div><div class="ddot" id="d8"></div><div class="ddot" id="d9"></div>
    </div>
    <div id="rollResult"></div>
  </div>
  <div id="log"><div style="text-align:center">Game log...</div></div>
  <p class="credit">Designed by: Khalid Al Seoud</p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  apiKey:"AIzaSyCTGEJe-CsiyDZQVdWIBkRYtWoQNy193U8",
  authDomain:"game-461bb.firebaseapp.com",
  databaseURL:"https://game-461bb-default-rtdb.firebaseio.com",
  projectId:"game-461bb",
  storageBucket:"game-461bb.firebasestorage.app",
  messagingSenderId:"634798461436",
  appId:"1:634798461436:web:dbb12ef70997ebdbf9e279"
});
const db = getDatabase(app);

const COLORS=["#e74c3c","#3498db","#9b59b6","#e67e22"];
const FACES={1:[5],2:[2,8],3:[1,5,9],4:[1,3,7,9],5:[1,3,5,7,9],6:[1,3,4,6,7,9]};
const SQ=[
  {n:0,type:"start",text:"START\nThe Community"},
  {n:1,type:"vocab",text:'Define\n"Apprehensive".'},
  {n:2,type:"good",text:"Move ahead\n2 spaces →"},
  {n:3,type:"question",text:"Why does Jonas\nfeel different?"},
  {n:4,type:"memory",text:"Memory Challenge:\nDescribe a\nhappy memory."},
  {n:5,type:"vocab",text:'What does\n"released" mean?'},
  {n:6,type:"vocab",text:'Define\n"Remorse".'},
  {n:7,type:"good",text:"The Giver helps.\nRoll again! 🎲"},
  {n:8,type:"question",text:"What is\nSameness?"},
  {n:9,type:"bad",text:"Skip 1 turn\n(take pills)."},
  {n:10,type:"vocab",text:'Define\n"Stirrings".'},
  {n:11,type:"good",text:"Move ahead\n1 space →"},
  {n:12,type:"question",text:"Why are memories\nimportant?"},
  {n:13,type:"vocab",text:'Define\n"Seeing Beyond".'},
  {n:14,type:"good",text:"Color memory!\nRoll again! 🎲"},
  {n:15,type:"bad",text:"Oh no!\nGo back 2 ←"},
  {n:16,type:"memory",text:"Theme Challenge:\nIs freedom worth\nthe pain?"},
  {n:17,type:"vocab",text:'Define\n"Adherence".'},
  {n:18,type:"question",text:"What choice did\nJonas make\nat the end?"},
  {n:19,type:"good",text:"Move ahead\n2 spaces →"},
  {n:20,type:"good",text:"You found\nElsewhere!\nYou win! 🌟"},
  {n:21,type:"finish",text:"FINISH\nElsewhere 🏔️"},
];
const T={start:{bg:"#1a1a2e",c:"#fff",l:""},finish:{bg:"#1a1a2e",c:"#fff",l:""},vocab:{bg:"#dbeafe",c:"#1e40af",l:"📚 Vocab"},question:{bg:"#fef3c7",c:"#b45309",l:"❓ Question"},memory:{bg:"#fce7f3",c:"#9d174d",l:"🌟 Challenge"},good:{bg:"#dcfce7",c:"#15803d",l:"✅ Bonus"},bad:{bg:"#fee2e2",c:"#b91c1c",l:"⚠️ Penalty"}};

let myName="",roomId="",myId="",rolling=false;

function buildBoard(){
  const g=document.getElementById("boardGrid"); g.innerHTML="";
  SQ.forEach(sq=>{
    const t=T[sq.type]||T.vocab;
    const d=document.createElement("div");
    d.className="cell"; d.id="cell-"+sq.n;
    d.style.background=t.bg; d.style.borderColor=t.c+"44";
    let h="";
    if(sq.n>0&&sq.n<21) h+=`<div class="cell-n" style="color:${t.c}">${sq.n}</div>`;
    if(t.l) h+=`<div class="cell-label" style="color:${t.c}">${t.l}</div>`;
    h+=`<div class="cell-text" style="color:${t.c}">${sq.text.replace(/\n/g,"<br>")}</div>`;
    h+=`<div class="tokens" id="tok-${sq.n}"></div>`;
    d.innerHTML=h; g.appendChild(d);
  });
}

function renderTokens(pl){
  document.querySelectorAll(".tokens").forEach(t=>t.innerHTML="");
  Object.values(pl).forEach(p=>{
    const c=document.getElementById("tok-"+(p.position??0));
    if(c) c.innerHTML+=`<div class="token" style="background:${p.color}" title="${p.name}">${p.name[0].toUpperCase()}</div>`;
  });
}

function renderPlayers(pl,ct){
  const bar=document.getElementById("playersBar"); bar.innerHTML="";
  Object.entries(pl).forEach(([id,p])=>{
    const d=document.createElement("div");
    d.className="pchip"+(id===ct?" myturn":"");
    d.style.background=p.color+"22"; d.style.color=p.color;
    d.style.borderColor=id===ct?p.color:"transparent";
    if(id===ct) d.style.boxShadow=`0 0 14px ${p.color}66`;
    d.textContent=`${p.name} · Sq ${p.position??0}`;
    bar.appendChild(d);
  });
}

function showFace(n){
  const a=FACES[n]||[];
  for(let i=1;i<=9;i++) document.getElementById("d"+i).className="ddot"+(a.includes(i)?" on":"");
}

function addLog(m){
  const l=document.getElementById("log");
  const e=document.createElement("div"); e.className="log-e"; e.textContent=m; l.prepend(e);
}

window.joinGame=async function(){
  const name=document.getElementById("nameInput").value.trim();
  const room=document.getElementById("roomInput").value.trim().toLowerCase();
  const err=document.getElementById("errMsg");
  if(!name||!room){err.textContent="Enter name and room code!";return;}
  err.textContent="";
  const snap=await get(ref(db,`rooms/${room}`));
  const data=snap.val()||{};
  const pl=data.players||{};
  if(Object.keys(pl).length>=4){err.textContent="Room is full! Max 4 players.";return;}
  myName=name; roomId=room; myId=name+"_"+Date.now();
  const color=COLORS[Object.keys(pl).length];
  await update(ref(db,`rooms/${room}/players/${myId}`),{name,color,position:0,id:myId});
  if(!data.currentTurn) await update(ref(db,`rooms/${room}`),{currentTurn:myId});
  document.getElementById("joinScreen").style.display="none";
  document.getElementById("gameScreen").style.display="block";
  buildBoard(); showFace(1);
  onValue(ref(db,`rooms/${room}`),snap=>{
    const s=snap.val(); if(!s) return;
    const pl=s.players||{}; const ct=s.currentTurn;
    renderTokens(pl); renderPlayers(pl,ct);
    const ami=pl[ct]?.name===myName;
    document.getElementById("turnInfo").textContent=ami?"🎲 Your turn! Roll the dice!":"⏳ Waiting for "+(pl[ct]?.name||"...");
    document.getElementById("die").className="die"+(ami?"":" off");
    Object.values(pl).forEach(p=>{
      if((p.position??0)>=21){
        const b=document.getElementById("winnerBanner");
        b.style.display="block"; b.textContent=`🎉 ${p.name} reached Elsewhere and wins!`;
      }
    });
  });
};

window.rollDice=async function(){
  if(rolling) return;
  const snap=await get(ref(db,`rooms/${roomId}`));
  const s=snap.val(); if(!s) return;
  const cp=s.players[s.currentTurn];
  if(!cp||cp.name!==myName) return;
  rolling=true;
  const die=document.getElementById("die");
  die.classList.add("rolling");
  document.getElementById("rollResult").textContent="";
  const iv=setInterval(()=>showFace(Math.ceil(Math.random()*6)),80);
  setTimeout(async()=>{
    clearInterval(iv); die.classList.remove("rolling");
    const roll=Math.ceil(Math.random()*6);
    showFace(roll);
    document.getElementById("rollResult").textContent="Rolled: "+roll;
    let pos=(cp.position??0)+roll;
    const sq=SQ.find(s=>s.n===Math.min(pos,21));
    if(sq?.type==="good"&&sq.text.includes("2 spaces")) pos=Math.min(pos+2,21);
    if(sq?.type==="good"&&sq.text.includes("1 space"))  pos=Math.min(pos+1,21);
    if(sq?.type==="bad"&&sq.text.includes("Go back 2"))  pos=Math.max(pos-2,0);
    pos=Math.min(pos,21);
    addLog(`${myName} rolled ${roll} → Square ${pos}`);
    if(sq&&["vocab","question","memory"].includes(sq.type)){
      document.getElementById("qType").textContent=sq.type==="vocab"?"📚 Vocabulary":sq.type==="question"?"❓ Question":"🌟 Challenge";
      document.getElementById("qText").textContent=sq.text.replace(/\n/g," ");
      document.getElementById("qCard").style.display="block";
    }
    await update(ref(db,`rooms/${roomId}/players/${myId}`),{position:pos});
    const again=sq?.type==="good"&&sq.text.includes("Roll again");
    const skip=sq?.type==="bad"&&sq.text.includes("Skip");
    if(!again){
      const keys=Object.keys(s.players);
      let ni=(keys.indexOf(s.currentTurn)+1)%keys.length;
      if(skip) ni=(ni+1)%keys.length;
      await update(ref(db,`rooms/${roomId}`),{currentTurn:keys[ni]});
    }
    rolling=false;
  },650);
};

window.closeQ=()=>document.getElementById("qCard").style.display="none";
</script>

</body>
</html>
